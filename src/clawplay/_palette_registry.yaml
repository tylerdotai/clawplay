# clawplay — per-sport palette registry.
# Authoritative source for `clawplay.palettes.palette_for(sport)`.
# Each sport gets its own color palette (no shared colorway).
# Hex values. The "no orange" rule from the ClawPlex brand system
# applies to ClawPlex marketing surfaces, NOT to per-sport palettes —
# when a sport's official brand identity includes orange (NHL, WNBA,
# La Liga, NBA Lakers, etc.) we honor the league's colors.
# Schema: hex strings, primary/secondary required, rest optional.

nfl:
  primary: "#013369"      # NFL navy
  secondary: "#d50a0a"    # signal red
  accent: "#869397"       # silver
  text: "#fafafa"
  muted: "#a3a3a3"
  surface: "#0a0a0a"
  raised: "#131313"
  background: "#050505"
  border: "#262626"

